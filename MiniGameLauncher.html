<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mini Game Launcher</title>
  <style>
    :root {
      --bg: #0e1726;
      --panel: #13213a;
      --text: #f6f8ff;
      --accent: #ffb703;
      --accent-2: #fb8500;
      --muted: #9cb1d5;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Yu Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 10%, rgba(251, 133, 0, 0.25), transparent 30%),
        radial-gradient(circle at 80% 90%, rgba(255, 183, 3, 0.2), transparent 35%),
        var(--bg);
    }

    .app-shell {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .header h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 3rem);
    }

    .header p {
      margin: 6px 0 0;
      color: var(--muted);
    }

    .panel {
      margin-top: 20px;
      background: linear-gradient(180deg, rgba(19, 33, 58, 0.92), rgba(12, 22, 40, 0.95));
      border: 1px solid rgba(255, 183, 3, 0.25);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.3);
    }

    .hidden { display: none; }

    .carousel-wrap {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
    }

    .card {
      position: relative;
      overflow: hidden;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.15);
      min-height: 300px;
      background: rgba(255,255,255,0.03);
      cursor: pointer;
      touch-action: pan-y;
    }

    .card img {
      width: 100%;
      height: min(64vw, 460px);
      object-fit: cover;
      display: block;
    }

    .title {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(0,0,0,0.55);
      font-weight: 600;
    }

    .nav-btn {
      border: none;
      background: var(--accent);
      color: #1f1f1f;
      width: 42px;
      height: 42px;
      border-radius: 999px;
      font-size: 1.1rem;
      cursor: pointer;
    }

    .nav-btn:hover { background: var(--accent-2); color: #fff; }

    .hint { color: var(--muted); }

    dialog {
      width: min(920px, 92vw);
      border-radius: 12px;
      border: none;
      background: #091222;
      color: #fff;
    }

    pre {
      background: #060d18;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 12px;
      max-height: 62vh;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .upload-form {
      display: grid;
      gap: 10px;
      margin: 12px 0;
    }

    input, button { font: inherit; }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      background: var(--accent);
      cursor: pointer;
    }

    .secondary {
      background: #4a5f84;
      color: white;
    }

    .message {
      min-height: 1.5em;
      color: #cde0ff;
    }

    @media (max-width: 700px) {
      .carousel-wrap { grid-template-columns: 1fr; }
      .nav-btn { width: 100%; border-radius: 10px; }
      .card img { height: min(70vw, 420px); }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="header">
      <h1>Mini Game Launcher</h1>
    </header>

    <section id="player-view" class="panel">
      <div class="carousel-wrap">
        <button id="prev-btn" class="nav-btn" aria-label="前へ">◀</button>
        <div id="card" class="card">
          <img id="game-image" alt="Mini Game" />
          <div id="game-title" class="title"></div>
        </div>
        <button id="next-btn" class="nav-btn" aria-label="次へ">▶</button>
      </div>

      <p class="hint">画像をタップすると対応するJavaファイル情報を表示します</p>

      <dialog id="source-dialog">
        <h2 id="dialog-title"></h2>
        <pre id="source-code"></pre>
        <form method="dialog">
          <button>閉じる</button>
        </form>
      </dialog>
    </section>

    <section id="admin-view" class="panel hidden">
      <h2>管理画面</h2>
      <p>GitHub の main ブランチにある MiniGame と MiniGameThumbnail から選択して登録します。</p>

      <form id="upload-form" class="upload-form">
        <label>
          GitHub ユーザー/組織
          <input id="repo-owner" type="text" placeholder="owner" required />
        </label>
        <label>
          GitHub リポジトリ名
          <input id="repo-name" type="text" placeholder="repository" required />
        </label>
        <button id="load-github" type="button">GitHub から一覧取得</button>
        <label>
          Javaファイル (main/MiniGame)
          <select id="java-select" required>
            <option value="">先に一覧取得してください</option>
          </select>
        </label>
        <label>
          画像ファイル (main/MiniGameThumbnail)
          <select id="image-select" required>
            <option value="">先に一覧取得してください</option>
          </select>
        </label>
        <button type="submit">登録</button>
      </form>

      <div id="admin-message" class="message"></div>
      <button id="back-btn" class="secondary">プレイヤー画面に戻る</button>
    </section>
  </main>

  <script>
    (() => {
      const playerView = document.getElementById('player-view');
      const adminView = document.getElementById('admin-view');
      const imgEl = document.getElementById('game-image');
      const titleEl = document.getElementById('game-title');
      const cardEl = document.getElementById('card');
      const sourceDialog = document.getElementById('source-dialog');
      const sourceCodeEl = document.getElementById('source-code');
      const dialogTitleEl = document.getElementById('dialog-title');
      const adminMessage = document.getElementById('admin-message');
      const uploadForm = document.getElementById('upload-form');
      const repoOwnerInput = document.getElementById('repo-owner');
      const repoNameInput = document.getElementById('repo-name');
      const loadGithubBtn = document.getElementById('load-github');
      const javaSelect = document.getElementById('java-select');
      const imageSelect = document.getElementById('image-select');

      const BRANCH = 'main';
      const JAVA_DIR = 'MiniGame';
      const THUMB_DIR = 'MiniGameThumbnail';
      const IMAGE_EXTS = new Set(['png', 'jpg', 'jpeg', 'gif', 'webp']);

      let githubJavaList = [];
      let githubImageList = [];

      let games = [];
      let currentIndex = 0;
      let touchStartX = 0;
      let adminSeq = null;

      function loadGames() {
        const raw = localStorage.getItem('mini-games');
        if (!raw) {
          games = [{
            name: 'NoData',
            imageUrl: '',
            source: '登録されたミニゲームがありません。管理画面から追加してください。'
          }];
          renderGame();
          return;
        }

        try {
          games = JSON.parse(raw);
        } catch {
          games = [];
        }

        if (!Array.isArray(games) || games.length === 0) {
          games = [{
            name: 'NoData',
            imageUrl: '',
            source: '登録されたミニゲームがありません。管理画面から追加してください。'
          }];
        }

        currentIndex = Math.min(currentIndex, games.length - 1);
        renderGame();
      }

      function saveGames(nextGames) {
        localStorage.setItem('mini-games', JSON.stringify(nextGames));
      }

      function renderGame() {
        const game = games[currentIndex];
        titleEl.textContent = game.name;
        imgEl.src = game.imageUrl || 'data:image/svg+xml;charset=UTF-8,' +
          encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360"><rect width="100%" height="100%" fill="#20324f"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#fff" font-size="28">No Image</text></svg>');
      }

      function showSourceInfo() {
        const game = games[currentIndex];
        dialogTitleEl.textContent = game.name + ' .java';
        sourceCodeEl.textContent = (game.source || 'ソースがありません') + '\n\n' +
          '[注記] HTML単体版ではブラウザの制約上、Java(.java)の直接実行と.class削除はできません。';
        sourceDialog.showModal();
      }

      function nextGame() {
        if (games.length === 0) return;
        currentIndex = (currentIndex + 1) % games.length;
        renderGame();
      }

      function prevGame() {
        if (games.length === 0) return;
        currentIndex = (currentIndex - 1 + games.length) % games.length;
        renderGame();
      }

      function switchToAdmin() {
        playerView.classList.add('hidden');
        adminView.classList.remove('hidden');
      }

      function switchToPlayer() {
        adminView.classList.add('hidden');
        playerView.classList.remove('hidden');
      }

      function sanitizeName(fileName) {
        return fileName.replace(/\.java$/i, '').replace(/[^a-zA-Z0-9_-]/g, '_').slice(0, 60) || 'Game';
      }

      function clearSelectOptions(selectEl, firstText) {
        selectEl.innerHTML = '';
        const opt = document.createElement('option');
        opt.value = '';
        opt.textContent = firstText;
        selectEl.appendChild(opt);
      }

      function fillSelect(selectEl, items, emptyText) {
        clearSelectOptions(selectEl, emptyText);
        for (const item of items) {
          const opt = document.createElement('option');
          opt.value = item.path;
          opt.textContent = item.name;
          selectEl.appendChild(opt);
        }
      }

      async function fetchGithubDir(owner, repo, dirPath) {
        const url = `https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(repo)}/contents/${dirPath}?ref=${encodeURIComponent(BRANCH)}`;
        const res = await fetch(url);
        if (!res.ok) {
          throw new Error(`GitHub API error (${res.status})`);
        }
        const data = await res.json();
        if (!Array.isArray(data)) {
          throw new Error('GitHub レスポンスが不正です');
        }
        return data.filter(item => item && item.type === 'file');
      }

      async function loadGithubLists() {
        const owner = repoOwnerInput.value.trim();
        const repo = repoNameInput.value.trim();
        if (!owner || !repo) {
          adminMessage.textContent = 'GitHub ユーザー/組織 と リポジトリ名を入力してください。';
          return;
        }

        adminMessage.textContent = 'GitHub から取得中...';
        try {
          const [javaFiles, imageFiles] = await Promise.all([
            fetchGithubDir(owner, repo, JAVA_DIR),
            fetchGithubDir(owner, repo, THUMB_DIR)
          ]);

          githubJavaList = javaFiles
            .filter(f => String(f.name).toLowerCase().endsWith('.java'))
            .map(f => ({ name: f.name, path: f.path, downloadUrl: f.download_url }));

          githubImageList = imageFiles
            .filter(f => {
              const ext = String(f.name).split('.').pop()?.toLowerCase() || '';
              return IMAGE_EXTS.has(ext);
            })
            .map(f => ({ name: f.name, path: f.path, downloadUrl: f.download_url }));

          fillSelect(javaSelect, githubJavaList, 'Javaファイルを選択');
          fillSelect(imageSelect, githubImageList, '画像ファイルを選択');

          if (githubJavaList.length === 0 || githubImageList.length === 0) {
            adminMessage.textContent = '対象ディレクトリに必要ファイルが見つかりませんでした。';
            return;
          }

          adminMessage.textContent = '一覧を取得しました。';
        } catch (err) {
          clearSelectOptions(javaSelect, '取得に失敗しました');
          clearSelectOptions(imageSelect, '取得に失敗しました');
          adminMessage.textContent = '一覧取得に失敗しました: ' + (err?.message || err);
        }
      }

      function resetAdminSequence() {
        adminSeq = null;
      }

      function startAdminSequence() {
        adminSeq = {
          startedAt: Date.now(),
          lastStepAt: Date.now(),
          step: 0
        };
      }

      function advanceAdminSequence(key) {
        if (!adminSeq) return;

        const now = Date.now();
        const expected = ['g', 'm', 'a', 'p'];

        if (now - adminSeq.startedAt > 5000) {
          resetAdminSequence();
          return;
        }
        if (adminSeq.step > 0 && now - adminSeq.lastStepAt > 1000) {
          resetAdminSequence();
          return;
        }

        if (key !== expected[adminSeq.step]) {
          resetAdminSequence();
          return;
        }

        adminSeq.step++;
        adminSeq.lastStepAt = now;

        if (adminSeq.step === expected.length) {
          switchToAdmin();
          resetAdminSequence();
        }
      }

      document.getElementById('next-btn').addEventListener('click', nextGame);
      document.getElementById('prev-btn').addEventListener('click', prevGame);
      document.getElementById('back-btn').addEventListener('click', switchToPlayer);
      cardEl.addEventListener('click', showSourceInfo);

      cardEl.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].clientX;
      }, { passive: true });

      cardEl.addEventListener('touchend', e => {
        const endX = e.changedTouches[0].clientX;
        const diff = endX - touchStartX;
        if (Math.abs(diff) > 40) {
          if (diff < 0) nextGame();
          else prevGame();
        }
      }, { passive: true });

      window.addEventListener('keydown', e => {
        if (e.key === 'Control') {
          startAdminSequence();
          return;
        }
        advanceAdminSequence(e.key.toLowerCase());
      });

      loadGithubBtn.addEventListener('click', loadGithubLists);

      uploadForm.addEventListener('submit', async e => {
        e.preventDefault();
        adminMessage.textContent = '';

        const owner = repoOwnerInput.value.trim();
        const repo = repoNameInput.value.trim();
        const javaPath = javaSelect.value;
        const imagePath = imageSelect.value;
        if (!owner || !repo || !javaPath || !imagePath) {
          adminMessage.textContent = 'GitHub 情報とJava/画像ファイルを選択してください。';
          return;
        }

        try {
          const javaItem = githubJavaList.find(item => item.path === javaPath);
          const imageItem = githubImageList.find(item => item.path === imagePath);
          if (!javaItem || !imageItem || !javaItem.downloadUrl || !imageItem.downloadUrl) {
            adminMessage.textContent = '選択したGitHubファイル情報が不正です。再取得してください。';
            return;
          }

          const javaRes = await fetch(javaItem.downloadUrl);
          if (!javaRes.ok) {
            throw new Error('Javaファイルの取得に失敗しました');
          }
          const javaText = await javaRes.text();

          const localGames = (() => {
            const raw = localStorage.getItem('mini-games');
            if (!raw) return [];
            try { return JSON.parse(raw); } catch { return []; }
          })();

          const name = sanitizeName(javaItem.name);
          const idx = localGames.findIndex(g => g.name === name);
          const next = { name, imageUrl: imageItem.downloadUrl, source: javaText };
          if (idx >= 0) localGames[idx] = next;
          else localGames.push(next);

          saveGames(localGames);
          adminMessage.textContent = '登録しました。';
          uploadForm.reset();
          loadGames();
        } catch (err) {
          adminMessage.textContent = '登録に失敗しました: ' + (err?.message || err);
        }
      });

      loadGames();
    })();
  </script>
</body>
</html>
