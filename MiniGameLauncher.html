<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mini Game Launcher</title>
  <style>
    :root {
      --bg: #0e1726;
      --panel: #13213a;
      --text: #f6f8ff;
      --accent: #ffb703;
      --accent-2: #fb8500;
      --muted: #9cb1d5;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Yu Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 10%, rgba(251, 133, 0, 0.25), transparent 30%),
        radial-gradient(circle at 80% 90%, rgba(255, 183, 3, 0.2), transparent 35%),
        var(--bg);
    }

    .app-shell {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .header h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 3rem);
    }

    .header p {
      margin: 6px 0 0;
      color: var(--muted);
    }

    .panel {
      margin-top: 20px;
      background: linear-gradient(180deg, rgba(19, 33, 58, 0.92), rgba(12, 22, 40, 0.95));
      border: 1px solid rgba(255, 183, 3, 0.25);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.3);
    }

    .hidden { display: none; }

    .carousel-wrap {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
    }

    .card {
      position: relative;
      overflow: hidden;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.15);
      min-height: 300px;
      background: rgba(255,255,255,0.03);
      cursor: pointer;
      touch-action: pan-y;
    }

    .card img {
      width: 100%;
      height: min(64vw, 460px);
      object-fit: cover;
      display: block;
    }

    .title {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(0,0,0,0.55);
      font-weight: 600;
    }

    .nav-btn {
      border: none;
      background: var(--accent);
      color: #1f1f1f;
      width: 42px;
      height: 42px;
      border-radius: 999px;
      font-size: 1.1rem;
      cursor: pointer;
    }

    .nav-btn:hover { background: var(--accent-2); color: #fff; }

    .hint { color: var(--muted); }

    dialog {
      width: min(920px, 92vw);
      border-radius: 12px;
      border: none;
      background: #091222;
      color: #fff;
    }

    pre {
      background: #060d18;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 12px;
      max-height: 62vh;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .upload-form {
      display: grid;
      gap: 10px;
      margin: 12px 0;
    }

    input, button { font: inherit; }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      background: var(--accent);
      cursor: pointer;
    }

    .secondary {
      background: #4a5f84;
      color: white;
    }

    .message {
      min-height: 1.5em;
      color: #cde0ff;
    }

    @media (max-width: 700px) {
      .carousel-wrap { grid-template-columns: 1fr; }
      .nav-btn { width: 100%; border-radius: 10px; }
      .card img { height: min(70vw, 420px); }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="header">
      <h1>Mini Game Launcher</h1>
      <p>管理画面: Ctrlを押してから5秒以内に g → m → a → p（各矢印間は1秒以内）</p>
    </header>

    <section id="player-view" class="panel">
      <div class="carousel-wrap">
        <button id="prev-btn" class="nav-btn" aria-label="前へ">◀</button>
        <div id="card" class="card">
          <img id="game-image" alt="Mini Game" />
          <div id="game-title" class="title"></div>
        </div>
        <button id="next-btn" class="nav-btn" aria-label="次へ">▶</button>
      </div>

      <p class="hint">画像をタップすると対応するJavaファイル情報を表示します</p>

      <dialog id="source-dialog">
        <h2 id="dialog-title"></h2>
        <pre id="source-code"></pre>
        <form method="dialog">
          <button>閉じる</button>
        </form>
      </dialog>
    </section>

    <section id="admin-view" class="panel hidden">
      <h2>管理画面</h2>
      <p>Javaファイルと画像をセットで登録します。保存先はブラウザ内（localStorage）です。</p>

      <form id="upload-form" class="upload-form">
        <label>
          Javaファイル(.java)
          <input id="java-file" type="file" accept=".java" required />
        </label>
        <label>
          画像ファイル(.png/.jpg/.jpeg/.webp/.gif)
          <input id="image-file" type="file" accept="image/*" required />
        </label>
        <button type="submit">登録</button>
      </form>

      <div id="admin-message" class="message"></div>
      <button id="back-btn" class="secondary">プレイヤー画面に戻る</button>
    </section>
  </main>

  <script>
    (() => {
      const playerView = document.getElementById('player-view');
      const adminView = document.getElementById('admin-view');
      const imgEl = document.getElementById('game-image');
      const titleEl = document.getElementById('game-title');
      const cardEl = document.getElementById('card');
      const sourceDialog = document.getElementById('source-dialog');
      const sourceCodeEl = document.getElementById('source-code');
      const dialogTitleEl = document.getElementById('dialog-title');
      const adminMessage = document.getElementById('admin-message');
      const uploadForm = document.getElementById('upload-form');
      const javaFileInput = document.getElementById('java-file');
      const imageFileInput = document.getElementById('image-file');

      let games = [];
      let currentIndex = 0;
      let touchStartX = 0;
      let adminSeq = null;

      function loadGames() {
        const raw = localStorage.getItem('mini-games');
        if (!raw) {
          games = [{
            name: 'NoData',
            imageUrl: '',
            source: '登録されたミニゲームがありません。管理画面から追加してください。'
          }];
          renderGame();
          return;
        }

        try {
          games = JSON.parse(raw);
        } catch {
          games = [];
        }

        if (!Array.isArray(games) || games.length === 0) {
          games = [{
            name: 'NoData',
            imageUrl: '',
            source: '登録されたミニゲームがありません。管理画面から追加してください。'
          }];
        }

        currentIndex = Math.min(currentIndex, games.length - 1);
        renderGame();
      }

      function saveGames(nextGames) {
        localStorage.setItem('mini-games', JSON.stringify(nextGames));
      }

      function renderGame() {
        const game = games[currentIndex];
        titleEl.textContent = game.name;
        imgEl.src = game.imageUrl || 'data:image/svg+xml;charset=UTF-8,' +
          encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360"><rect width="100%" height="100%" fill="#20324f"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#fff" font-size="28">No Image</text></svg>');
      }

      function showSourceInfo() {
        const game = games[currentIndex];
        dialogTitleEl.textContent = game.name + ' .java';
        sourceCodeEl.textContent = (game.source || 'ソースがありません') + '\n\n' +
          '[注記] HTML単体版ではブラウザの制約上、Java(.java)の直接実行と.class削除はできません。';
        sourceDialog.showModal();
      }

      function nextGame() {
        if (games.length === 0) return;
        currentIndex = (currentIndex + 1) % games.length;
        renderGame();
      }

      function prevGame() {
        if (games.length === 0) return;
        currentIndex = (currentIndex - 1 + games.length) % games.length;
        renderGame();
      }

      function switchToAdmin() {
        playerView.classList.add('hidden');
        adminView.classList.remove('hidden');
      }

      function switchToPlayer() {
        adminView.classList.add('hidden');
        playerView.classList.remove('hidden');
      }

      function sanitizeName(fileName) {
        return fileName.replace(/\.java$/i, '').replace(/[^a-zA-Z0-9_-]/g, '_').slice(0, 60) || 'Game';
      }

      function fileToText(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result));
          reader.onerror = reject;
          reader.readAsText(file, 'UTF-8');
        });
      }

      function fileToDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result));
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      function resetAdminSequence() {
        adminSeq = null;
      }

      function startAdminSequence() {
        adminSeq = {
          startedAt: Date.now(),
          lastStepAt: Date.now(),
          step: 0
        };
      }

      function advanceAdminSequence(key) {
        if (!adminSeq) return;

        const now = Date.now();
        const expected = ['g', 'm', 'a', 'p'];

        if (now - adminSeq.startedAt > 5000) {
          resetAdminSequence();
          return;
        }
        if (adminSeq.step > 0 && now - adminSeq.lastStepAt > 1000) {
          resetAdminSequence();
          return;
        }

        if (key !== expected[adminSeq.step]) {
          resetAdminSequence();
          return;
        }

        adminSeq.step++;
        adminSeq.lastStepAt = now;

        if (adminSeq.step === expected.length) {
          switchToAdmin();
          resetAdminSequence();
        }
      }

      document.getElementById('next-btn').addEventListener('click', nextGame);
      document.getElementById('prev-btn').addEventListener('click', prevGame);
      document.getElementById('back-btn').addEventListener('click', switchToPlayer);
      cardEl.addEventListener('click', showSourceInfo);

      cardEl.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].clientX;
      }, { passive: true });

      cardEl.addEventListener('touchend', e => {
        const endX = e.changedTouches[0].clientX;
        const diff = endX - touchStartX;
        if (Math.abs(diff) > 40) {
          if (diff < 0) nextGame();
          else prevGame();
        }
      }, { passive: true });

      window.addEventListener('keydown', e => {
        if (e.key === 'Control') {
          startAdminSequence();
          return;
        }
        advanceAdminSequence(e.key.toLowerCase());
      });

      uploadForm.addEventListener('submit', async e => {
        e.preventDefault();
        adminMessage.textContent = '';

        const javaFile = javaFileInput.files?.[0];
        const imageFile = imageFileInput.files?.[0];
        if (!javaFile || !imageFile) {
          adminMessage.textContent = 'Javaファイルと画像を選択してください。';
          return;
        }

        try {
          const [javaText, imageDataUrl] = await Promise.all([
            fileToText(javaFile),
            fileToDataUrl(imageFile)
          ]);

          const localGames = (() => {
            const raw = localStorage.getItem('mini-games');
            if (!raw) return [];
            try { return JSON.parse(raw); } catch { return []; }
          })();

          const name = sanitizeName(javaFile.name);
          const idx = localGames.findIndex(g => g.name === name);
          const next = { name, imageUrl: imageDataUrl, source: javaText };
          if (idx >= 0) localGames[idx] = next;
          else localGames.push(next);

          saveGames(localGames);
          adminMessage.textContent = '登録しました。';
          uploadForm.reset();
          loadGames();
        } catch (err) {
          adminMessage.textContent = '登録に失敗しました: ' + (err?.message || err);
        }
      });

      loadGames();
    })();
  </script>
</body>
</html>
